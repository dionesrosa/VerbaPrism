<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Texto para teste</title>
</head>
<body>
  <main>
    <h1>Envie seu texto</h1>
    <form action="#" method="post">
      <label for="texto">Texto:</label>
      <textarea id="texto" name="texto" rows="8" cols="40" placeholder="Digite seu texto aqui..."></textarea>
      <button type="submit">Enviar</button>
    </form>
  </main>
</body>
</html>
