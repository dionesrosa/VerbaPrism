<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barra de Ferramentas de Visualização</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Menus Dropdown (Contextuais) -->
  <div id="menu-btn-opcoes" class="dropdown-menu" role="menu" aria-labelledby="btn-opcoes">
    <button class="dropdown-item" data-action="atalhos" role="menuitem">
      <span>⌨</span> Atalhos de teclado
    </button>
    <button class="dropdown-item" data-action="resetar" role="menuitem">
      <span>↺</span> Resetar seleção
    </button>
    <div class="dropdown-separator"></div>
    <button class="dropdown-item" data-action="fechar" role="menuitem">
      <span>✕</span> Fechar barra
    </button>
  </div>

  <div id="menu-btn-desenhar" class="dropdown-menu" role="menu" aria-labelledby="btn-desenhar">
    <button class="dropdown-item" data-action="cor-azul" role="menuitem">🔵 Azul</button>
    <button class="dropdown-item" data-action="cor-vermelho" role="menuitem">🔴 Vermelho</button>
    <button class="dropdown-item" data-action="cor-verde" role="menuitem">🟢 Verde</button>
  </div>

  <!-- Toolbar Principal -->
  <div class="toolbar-wrapper" id="barra-wrapper">
    <div class="toolbar-pill" id="barra-pill" title="Clique para fixar">
